# MSL dataset configuration
# Data format: MSL_train.npy (T_train, 55), MSL_test.npy (T_test, 55),
#              MSL_test_label.npy (T_test,)

dataset: msl
data_path: /root/autodl-tmp/data/AT/MSL
n_sensors: 55
window_size: 100
# Same patch divisibility as smap: 100/10=10, 100/20=5, 100/50=2 ✓
patch_sizes: [10, 20, 50]
top_k: 8                   # GAT top-k neighbors (K ≈ 0.15*N)

batch_size: 256
stride: 1
