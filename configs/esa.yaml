# ESA Mission-1 dataset configuration
# Data format: ESA-Mission1/
#   channels/channel_*.zip  (6 channels, subsystem 5, channels 41-46)
#   telecommands/telecommand_*.zip
#   channels.csv, labels.csv, anomaly_type.csv, telecommands.csv
#
# Reference: PSTG paper (entropy-28-00426, Chen et al. 2026)

dataset: esa
data_path: /root/autodl-tmp/data/ESA-Mission1
n_sensors: 6
window_size: 250           # matches PSTG context window L=250
top_k: 4                   # 对齐 PSTG γ=0.1：N=6, 0.1×6×6≈4 edges/node

batch_size: 70
patience: 0
forecast_horizon: 10  # 预测未来 10 步，对齐 PSTG (F=10)
train_stride: 125          # 训练时每隔 125 步取一个窗口（与 p_main 相同量级）
                           # 15M × 0.5 / 125 ≈ 6.1万个训练窗口，每 epoch 约几分钟
stride: 25                 # 测试评分时步长，够细粒度又不至于 OOM
p_fit: 0.21               # PSTG threshold fitting percentage

# ESA-specific: channel selection
# Subsystem 5, channel indices 41-46 (0-indexed IDs as in channels.csv)
esa_subsystem: 5
# 显式指定 6 个通道（subsystem_5），跳过 channels.csv 自动检测
# 与 PSTG 论文一致：channel_41 ~ channel_46
esa_channel_ids: [41, 42, 43, 44, 45, 46]
esa_cache_path: null       # 首次跑完后填路径，之后直接读 .npy 跳过解压

# 时间切分：总时间 2000-01 ~ 2013-12（168 个月）
# train_ratio=0.5 → 前 84 个月（2000-01 ~ 2007-01）train+val
#                   后 84 个月（2007-01 ~ 2013-12）test
# 与 PSTG 的 test 集边界一致（81月训 + 3月验 + 84月测）
train_ratio: 0.5
